<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>治愈合集 - Soul Soother</title>
  <meta name="description" content="收集、测评、整理能让人短暂放松、开心一秒钟的小游戏、治愈网页、互动工具">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @media screen and (max-width: 393px) {
      html { font-size: 15px; }
    }
    .gravity-dot {
      box-shadow: 0 0 0 2px rgba(115, 138, 229, 0.2);
    }
  </style>
</head>
<body>
  <!-- 文字引力场背景 -->
  <div class="gravity-bg" id="gravityBg"></div>

  <main class="main-content">
    <h1 class="page-title">治愈合集</h1>
    <p class="page-subtitle">收集了一些可能让你放松一小会儿的东西</p>

    <div class="category-tabs" role="tablist">
      <button class="category-tab active" role="tab" aria-selected="true" onclick="filterCategory('all', this)">全部</button>
      <button class="category-tab" role="tab" aria-selected="false" onclick="filterCategory('games', this)">小游戏</button>
      <button class="category-tab" role="tab" aria-selected="false" onclick="filterCategory('websites', this)">治愈网页</button>
      <button class="category-tab" role="tab" aria-selected="false" onclick="filterCategory('tools', this)">互动工具</button>
    </div>

    <div class="collection-grid" id="collectionGrid"></div>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bottom-nav-item">
        <span>首页</span>
      </a>
      <a href="quiz.html" class="bottom-nav-item">
        <span>测评</span>
      </a>
      <a href="collection.html" class="bottom-nav-item active">
        <span>合集</span>
      </a>
      <a href="tools.html" class="bottom-nav-item">
        <span>工具</span>
      </a>
      <a href="about.html" class="bottom-nav-item">
        <span>关于</span>
      </a>
    </div>
  </nav>

  <footer class="footer">
    <div class="footer-text">Soul Soother - 用抽象接住崩溃，用玩笑降低痛感</div>
    <div class="footer-text">本网站仅供娱乐和放松，不能替代专业医疗建议</div>
    <div class="footer-links">
      <a href="about.html">关于我们</a>
      <a href="about.html#help">求助资源</a>
      <a href="https://github.com/tangzi-kk/soul-soother" target="_blank">GitHub</a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    var currentCategory = 'all';

    var categoryIcons = {
      'games': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>',
      'websites': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>',
      'tools': '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>'
    };

    function renderCollections() {
      var grid = document.getElementById('collectionGrid');
      var filtered = [];
      if (currentCategory === 'all') {
        filtered = collections;
      } else {
        for (var i = 0; i < collections.length; i++) {
          if (collections[i].category === currentCategory) {
            filtered.push(collections[i]);
          }
        }
      }

      var html = '';
      for (var j = 0; j < filtered.length; j++) {
        var item = filtered[j];
        var tagsHtml = '';
        for (var t = 0; t < item.tags.length; t++) {
          tagsHtml += '<span class="tag">' + item.tags[t] + '</span>';
        }
        var ratingsHtml = '';
        if (item.ratings) {
          ratingsHtml = '<span class="rating-dim"><span class="rating-dim-label">趣</span><span class="rating-stars">' + renderStars(item.ratings.fun) + '</span></span>' +
            '<span class="rating-dim"><span class="rating-dim-label">轻</span><span class="rating-stars">' + renderStars(item.ratings.ease) + '</span></span>' +
            '<span class="rating-dim"><span class="rating-dim-label">愈</span><span class="rating-stars">' + renderStars(item.ratings.relief) + '</span></span>';
        }
        var reviewHtml = item.review ? '<div class="collection-item-review">"' + item.review + '"</div>' : '';
        var iconSvg = categoryIcons[item.category] || '';
        html += '<a href="' + item.url + '" target="_blank" rel="noopener" class="collection-item">' +
          '<span class="collection-item-icon">' + iconSvg + '</span>' +
          '<div class="collection-item-content">' +
            '<div class="collection-item-title">' + item.name + '</div>' +
            '<div class="collection-item-desc">' + item.description + '</div>' +
            '<div class="collection-item-tags">' + tagsHtml + '</div>' +
            '<div class="collection-item-mood">' + (item.mood || '') + '</div>' +
            '<div class="collection-item-ratings">' + ratingsHtml + '</div>' +
            reviewHtml +
          '</div>' +
        '</a>';
      }
      grid.innerHTML = html;
    }

    function filterCategory(category, el) {
      currentCategory = category;
      var tabs = document.querySelectorAll('.category-tab');
      for (var i = 0; i < tabs.length; i++) {
        tabs[i].classList.remove('active');
        tabs[i].setAttribute('aria-selected', 'false');
      }
      el.classList.add('active');
      el.setAttribute('aria-selected', 'true');
      renderCollections();
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderCollections();
    });
  </script>
  <script src="js/p5-gravity.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.GravityP5) {
        window.GravityP5.init('gravityBg');
      }
    });
  </script>
</body>
</html>
