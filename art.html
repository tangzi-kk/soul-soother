<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Soul Soother — 文字引力场</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--color-canvas);
      height: 100vh;
      height: 100dvh;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .art-ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      pointer-events: none;
      padding: var(--space-6);
    }
    .art-ui * {
      pointer-events: auto;
    }
    .art-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .art-title {
      font-family: var(--font-display);
      font-size: var(--text-caption);
      font-weight: var(--weight-display);
      letter-spacing: var(--tracking-wide);
      color: var(--color-slate);
      text-transform: uppercase;
    }
    .art-close {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--color-border);
      background: rgba(255,255,255,0.9);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .art-close:hover {
      border-color: var(--color-charcoal);
    }
    .art-controls {
      position: fixed;
      bottom: calc(64px + var(--safe-bottom) + var(--space-4));
      left: var(--space-6);
      right: var(--space-6);
      z-index: 10;
      pointer-events: none;
    }
    .art-controls * {
      pointer-events: auto;
    }
    .art-hint {
      font-size: var(--text-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--color-slate);
      text-align: center;
      margin-bottom: var(--space-3);
      opacity: 0.7;
    }
    .art-slider-wrap {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      padding: var(--space-4) var(--space-5);
      border: 1px solid var(--color-border);
    }
    .art-slider-label {
      display: flex;
      justify-content: space-between;
      font-size: var(--text-caption);
      letter-spacing: var(--tracking-caption);
      color: var(--color-slate);
      margin-bottom: var(--space-2);
    }
    .art-status {
      position: fixed;
      bottom: calc(64px + var(--safe-bottom));
      left: 0;
      right: 0;
      text-align: center;
      font-size: var(--text-tiny);
      letter-spacing: var(--tracking-caption);
      color: var(--color-slate);
      opacity: 0.5;
      z-index: 10;
      padding: var(--space-2);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="art-ui">
    <div class="art-header">
      <div class="art-title">文字引力场</div>
      <a href="index.html" class="art-close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </a>
    </div>
  </div>

  <div class="art-controls">
    <div class="art-hint">点击屏幕生成引力点，文字会被吸引重组</div>
    <div class="art-slider-wrap">
      <div class="art-slider-label">
        <span>引力强度</span>
        <span id="strengthValue">50%</span>
      </div>
      <input type="range" class="mood-slider" id="strengthSlider" min="10" max="100" value="50">
    </div>
  </div>

  <div class="art-status" id="artStatus">等待点击...</div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bottom-nav-item">
        <span>首页</span>
      </a>
      <a href="quiz.html" class="bottom-nav-item">
        <span>测评</span>
      </a>
      <a href="collection.html" class="bottom-nav-item">
        <span>合集</span>
      </a>
      <a href="tools.html" class="bottom-nav-item">
        <span>工具</span>
      </a>
      <a href="about.html" class="bottom-nav-item">
        <span>关于</span>
      </a>
    </div>
  </nav>

  <script>
    /* ========================================
       交互文字引力场 — p5.js 实现
       灵感：文字像有生命一样被引力点吸引重组
       ======================================== */

    const CONFIG = {
      text: {
        content: "用抽象接住崩溃用玩笑降低痛感你不是一个人每个崩溃的瞬间都值得被温柔对待活着本身就是一种勇气今天的你已经很厉害了",
        fontSize: 14,
        color: "#2d2d2d",
        strokeColor: "#000000",
        strokeWeight: 0,
        letterSpacing: 2,
        lineSpacing: 28,
        margin: 20
      },
      dot: {
        color: "#738ae5",
        size: 6,
        positionRange: {
          x: [50, 350],
          y: [80, 600]
        },
        generationInterval: 8
      },
      attraction: {
        countRange: [15, 35],
        safeDistance: 20,
        speed: 0.04,
        targetFontSize: 22,
        targetColors: ["#738ae5", "#5a72d0", "#878887"]
      },
      line: {
        color: "#e8e8e8",
        thickness: 1.5,
        lengthRange: [40, 80]
      },
      curve: {
        color: "#f0f0f0",
        thickness: 1,
        generationRate: 0.3,
        startYRange: [100, 500],
        lengthRange: [200, 400]
      }
    };

    let chars = [];
    let dots = [];
    let curves = [];
    let canvasW, canvasH;
    let attractionStrength = 0.5;
    let frameCounter = 0;

    function setup() {
      canvasW = windowWidth;
      canvasH = windowHeight;
      let cnv = createCanvas(canvasW, canvasH);
      cnv.parent('canvas-container');
      textFont('Microsoft YaHei, PingFang SC, sans-serif');
      initText();

      document.getElementById('strengthSlider').addEventListener('input', function(e) {
        attractionStrength = e.target.value / 100;
        document.getElementById('strengthValue').textContent = e.target.value + '%';
      });
    }

    function windowResized() {
      canvasW = windowWidth;
      canvasH = windowHeight;
      resizeCanvas(canvasW, canvasH);
      initText();
      dots = [];
      curves = [];
    }

    function initText() {
      chars = [];
      let x = CONFIG.text.margin;
      let y = CONFIG.text.margin + 80;
      let content = CONFIG.text.content;

      for (let i = 0; i < content.length; i++) {
        let ch = content[i];
        let chWidth = textWidth(ch) + CONFIG.text.letterSpacing;

        if (ch === '\n' || x + chWidth > canvasW - CONFIG.text.margin) {
          x = CONFIG.text.margin;
          y += CONFIG.text.lineSpacing;
          if (ch === '\n') continue;
        }

        chars.push({
          char: ch,
          originX: x,
          originY: y,
          x: x,
          y: y,
          targetX: x,
          targetY: y,
          attracted: false,
          dotIndex: -1,
          fontSize: CONFIG.text.fontSize,
          color: CONFIG.text.color,
          angle: 0
        });

        x += chWidth;
      }
    }

    function draw() {
      background(250, 248, 245);

      // 绘制曲线
      drawCurves();

      // 绘制圆点和直线
      for (let i = 0; i < dots.length; i++) {
        let d = dots[i];

        // 直线
        stroke(CONFIG.line.color);
        strokeWeight(CONFIG.line.thickness);
        line(d.x, d.y, d.x, d.y + d.lineLength);

        // 圆点
        noStroke();
        fill(d.color);
        ellipse(d.x, d.y, d.size, d.size);

        // 吸引文字
        attractChars(d, i);
      }

      // 绘制文字
      for (let i = 0; i < chars.length; i++) {
        let c = chars[i];

        // 平滑移动
        c.x += (c.targetX - c.x) * CONFIG.attraction.speed;
        c.y += (c.targetY - c.y) * CONFIG.attraction.speed;

        // 旋转效果（被吸引时轻微旋转）
        if (c.attracted) {
          c.angle += (random(-0.05, 0.05) - c.angle) * 0.1;
        } else {
          c.angle += (0 - c.angle) * 0.1;
        }

        push();
        translate(c.x, c.y);
        rotate(c.angle);

        // 描边
        if (CONFIG.text.strokeWeight > 0) {
          stroke(CONFIG.text.strokeColor);
          strokeWeight(CONFIG.text.strokeWeight);
        } else {
          noStroke();
        }

        fill(c.color);
        textSize(c.fontSize);
        textAlign(CENTER, CENTER);
        text(c.char, 0, 0);
        pop();
      }

      // 自动生成圆点（如果还有未被吸引的文字）
      frameCounter++;
      if (frameCounter % CONFIG.dot.generationInterval === 0) {
        let hasUnattracted = false;
        for (let i = 0; i < chars.length; i++) {
          if (!chars[i].attracted) {
            hasUnattracted = true;
            break;
          }
        }
        if (hasUnattracted && dots.length < 15) {
          generateDot();
        }
      }

      // 更新状态
      updateStatus();
    }

    function drawCurves() {
      if (random() < CONFIG.curve.generationRate && curves.length < 5) {
        curves.push({
          x: -50,
          y: random(CONFIG.curve.startYRange[0], CONFIG.curve.startYRange[1]),
          length: random(CONFIG.curve.lengthRange[0], CONFIG.curve.lengthRange[1]),
          amplitude: random(20, 60),
          speed: random(1, 3),
          offset: random(100)
        });
      }

      for (let i = curves.length - 1; i >= 0; i--) {
        let c = curves[i];
        c.x += c.speed;

        if (c.x > canvasW + c.length) {
          curves.splice(i, 1);
          continue;
        }

        noFill();
        stroke(CONFIG.curve.color);
        strokeWeight(CONFIG.curve.thickness);
        beginShape();
        for (let px = 0; px < c.length; px += 5) {
          let cx = c.x + px;
          let cy = c.y + sin((px + c.offset) * 0.02) * c.amplitude;
          vertex(cx, cy);
        }
        endShape();
      }
    }

    function generateDot() {
      let x = random(CONFIG.dot.positionRange.x[0], min(CONFIG.dot.positionRange.x[1], canvasW - 50));
      let y = random(CONFIG.dot.positionRange.y[0], min(CONFIG.dot.positionRange.y[1], canvasH - 200));

      dots.push({
        x: x,
        y: y,
        color: CONFIG.dot.color,
        size: CONFIG.dot.size,
        lineLength: random(CONFIG.line.lengthRange[0], CONFIG.line.lengthRange[1]),
        attractedChars: [],
        targetCount: floor(random(CONFIG.attraction.countRange[0], CONFIG.attraction.countRange[1]))
      });
    }

    function attractChars(dot, dotIndex) {
      if (dot.attractedChars.length >= dot.targetCount) return;

      // 找到最近的未被吸引的文字
      let candidates = [];
      for (let i = 0; i < chars.length; i++) {
        if (!chars[i].attracted) {
          let d = dist(chars[i].x, chars[i].y, dot.x, dot.y);
          candidates.push({ index: i, distance: d });
        }
      }

      // 按距离排序
      candidates.sort(function(a, b) { return a.distance - b.distance; });

      // 吸引最近的几个
      let toAttract = min(3, dot.targetCount - dot.attractedChars.length);
      for (let i = 0; i < toAttract && i < candidates.length; i++) {
        let ci = candidates[i].index;

        // 检查安全距离
        let tooClose = false;
        for (let j = 0; j < dot.attractedChars.length; j++) {
          let aj = dot.attractedChars[j];
          let d = dist(chars[ci].x, chars[ci].y, chars[aj].x, chars[aj].y);
          if (d < CONFIG.attraction.safeDistance) {
            tooClose = true;
            break;
          }
        }

        if (!tooClose) {
          chars[ci].attracted = true;
          chars[ci].dotIndex = dotIndex;
          chars[ci].targetX = dot.x + random(-30, 30);
          chars[ci].targetY = dot.y - random(15, 50);
          chars[ci].fontSize = CONFIG.attraction.targetFontSize * attractionStrength + 8;
          chars[ci].color = random(CONFIG.attraction.targetColors);
          dot.attractedChars.push(ci);
        }
      }
    }

    function mousePressed() {
      // 检查是否点击在 UI 区域
      if (mouseY < 80 || mouseY > canvasH - 180) return;

      // 在点击位置生成引力点
      dots.push({
        x: mouseX,
        y: mouseY,
        color: CONFIG.dot.color,
        size: CONFIG.dot.size * 1.5,
        lineLength: random(CONFIG.line.lengthRange[0], CONFIG.line.lengthRange[1]),
        attractedChars: [],
        targetCount: floor(random(CONFIG.attraction.countRange[0], CONFIG.attraction.countRange[1]))
      });

      // 添加曲线效果
      curves.push({
        x: mouseX - 100,
        y: mouseY + random(-50, 50),
        length: random(200, 400),
        amplitude: random(30, 80),
        speed: random(2, 4),
        offset: random(100)
      });
    }

    function updateStatus() {
      let attracted = 0;
      for (let i = 0; i < chars.length; i++) {
        if (chars[i].attracted) attracted++;
      }
      let status = '已重组 ' + attracted + '/' + chars.length + ' 个文字';
      if (attracted === chars.length) {
        status = '所有文字已重组完成，点击屏幕重新开始';
      }
      document.getElementById('artStatus').textContent = status;
    }

    function touchStarted() {
      if (touches.length > 0) {
        mouseX = touches[0].x;
        mouseY = touches[0].y;
        mousePressed();
      }
      return false;
    }
  </script>
</body>
</html>
