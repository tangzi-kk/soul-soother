<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>互动工具 - Soul Soother</title>
  <meta name="description" content="发疯文学生成器、精神状态检测器、想死替代方案生成器等互动工具">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @media screen and (max-width: 393px) {
      html { font-size: 15px; }
    }
    .gravity-dot {
      box-shadow: 0 0 0 2px rgba(115, 138, 229, 0.2);
    }
  </style>
</head>
<body>
  <!-- 文字引力场背景 -->
  <div class="gravity-bg" id="gravityBg"></div>

  <main class="main-content">
    <h1 class="page-title">互动工具</h1>
    <p class="page-subtitle">一些可能让你笑一笑的小工具</p>

    <div class="tool-card" id="fengwen">
      <div class="tool-card-header">
        <span class="tool-card-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
        </span>
        <div class="tool-card-title">发疯文学生成器</div>
      </div>
      <div class="tool-card-desc">输入你的情绪关键词，生成一段发疯文学</div>
      <input type="text" class="generator-input" id="fengwenInput" placeholder="输入情绪，如：想死、崩溃、孤独...">
      <button class="cta cta-primary" onclick="generateFengwenOutput()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle;" aria-hidden="true"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        生成发疯文学
      </button>
      <div class="generator-output" id="fengwenOutput"></div>
    </div>

    <div class="tool-card" id="alt-plan">
      <div class="tool-card-header">
        <span class="tool-card-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        </span>
        <div class="tool-card-title">"想死"替代方案</div>
      </div>
      <div class="tool-card-desc">当你想死的时候，看看还有什么可以先做完</div>
      <button class="cta cta-primary" onclick="generateAlternative()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle;" aria-hidden="true"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
        生成替代方案
      </button>
      <div class="generator-output" id="alternativeOutput"></div>
    </div>

    <div class="tool-card" id="help-card">
      <div class="tool-card-header">
        <span class="tool-card-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
        </span>
        <div class="tool-card-title">互助卡</div>
      </div>
      <div class="tool-card-desc">抽一张互助卡，给自己或给别人</div>
      <div class="help-card-draw">
        <div class="help-card-icon-wrap" id="helpCardIcon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
        </div>
        <div class="help-card-prompt" id="helpCardText">点击抽取你的互助卡</div>
        <button class="cta cta-primary" onclick="drawHelpCard()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle;" aria-hidden="true"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
          抽一张
        </button>
      </div>
    </div>

    <div class="tool-card">
      <div class="tool-card-header">
        <span class="tool-card-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
        </span>
        <div class="tool-card-title">精神状态快速检测</div>
      </div>
      <div class="tool-card-desc">快速回答几个问题，看看你今天精神状态如何</div>
      <div id="quickCheck">
        <div class="quick-check-wrap">
          <div class="quick-check-question">1. 你现在的能量状态？</div>
          <div class="quick-check-options">
            <button class="cta cta-ghost quick-check-btn" onclick="quickCheck(1)">满格 — 今天能大杀四方</button>
            <button class="cta cta-ghost quick-check-btn" onclick="quickCheck(2)">一半 — 够用就行</button>
            <button class="cta cta-ghost quick-check-btn" onclick="quickCheck(3)">快没电了 — 别跟我说话</button>
            <button class="cta cta-ghost quick-check-btn" onclick="quickCheck(4)">早就关机了 — 但还在硬撑</button>
          </div>
        </div>
      </div>
      <div id="quickResult" class="hidden quick-result-box">
        <div class="quick-result-title" id="quickResultTitle"></div>
        <div class="quick-result-text" id="quickResultText"></div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bottom-nav-item">
        <span>首页</span>
      </a>
      <a href="quiz.html" class="bottom-nav-item">
        <span>测评</span>
      </a>
      <a href="collection.html" class="bottom-nav-item">
        <span>合集</span>
      </a>
      <a href="tools.html" class="bottom-nav-item active">
        <span>工具</span>
      </a>
      <a href="about.html" class="bottom-nav-item">
        <span>关于</span>
      </a>
    </div>
  </nav>

  <footer class="footer">
    <div class="footer-text">Soul Soother - 用抽象接住崩溃，用玩笑降低痛感</div>
    <div class="footer-text">本网站仅供娱乐和放松，不能替代专业医疗建议</div>
    <div class="footer-links">
      <a href="about.html">关于我们</a>
      <a href="about.html#help">求助资源</a>
      <a href="https://github.com/tangzi-kk/soul-soother" target="_blank">GitHub</a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>

      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"></path><line x1="16" y1="8" x2="2" y2="22"></line><line x1="17.5" y1="15" x2="9" y2="15"></line></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l7.586 7.586"></path><circle cx="11" cy="11" r="2"></circle></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line></svg>',
      '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>'
    ];

    function generateFengwenOutput() {
      var input = document.getElementById('fengwenInput').value.trim();
      if (!input) {
        alert('输入点什么吧，比如"想死"、"崩溃"');
        return;
      }
      var output = generateFengwen(input);
      var outputEl = document.getElementById('fengwenOutput');
      outputEl.textContent = output;
      outputEl.classList.add('show');
    }

    function generateAlternative() {
      var output = getAlternative();
      var outputEl = document.getElementById('alternativeOutput');
      outputEl.innerHTML = output.text + '<span class="alt-type-tag">' + output.type + '</span>';
      outputEl.classList.add('show');
    }

    function drawHelpCard() {
      var cards = tools.helpCards;
      var card = cards[Math.floor(Math.random() * cards.length)];
      var iconIndex = Math.floor(Math.random() * helpCardIcons.length);
      document.getElementById('helpCardIcon').innerHTML = helpCardIcons[iconIndex];
      document.getElementById('helpCardText').textContent = card.text;
      document.getElementById('helpCardIcon').style.animation = 'none';
      setTimeout(function() {
        document.getElementById('helpCardIcon').style.animation = 'float 3s ease-in-out infinite';
      }, 10);
    }

    function quickCheck(level) {
      var results = {
        1: { title: "能量满格", text: "恭喜！你今天状态不错，建议把这份能量存起来，因为明天可能就用完了" },
        2: { title: "能量一半", text: "正常状态。建议先完成最重要的一件事，其他的可以明天再说" },
        3: { title: "快没电了", text: "你的能量即将耗尽。建议立即躺平，充电至少8小时" },
        4: { title: "已关机但硬撑", text: "检测到你是传说级疯批。建议：1. 放下手机 2. 躺下 3. 闭上眼睛 4. 明天再说" },
      };
      var result = results[level];
      document.getElementById('quickResultTitle').textContent = result.title;
      document.getElementById('quickResultText').textContent = result.text;
      document.getElementById('quickCheck').classList.add('hidden');
      document.getElementById('quickResult').classList.remove('hidden');
    }
  </script>
  <script src="js/p5-gravity.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.GravityP5) {
        window.GravityP5.init('gravityBg');
      }
    });
  </script>
</body>
</html>
