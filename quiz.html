<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=393, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>趣味测评 - Soul Soother</title>
  <meta name="description" content="用荒诞的题目检测你的精神状态，结果可能让你笑出声">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <style>
    @media screen and (max-width: 393px) {
      html { font-size: 15px; }
    }
    .gravity-dot {
      box-shadow: 0 0 0 2px rgba(115, 138, 229, 0.2);
    }
  </style>
</head>
<body>
  <!-- 文字引力场背景 -->
  <div class="gravity-bg" id="gravityBg"></div>

  <main class="main-content">
    <div class="disclaimer">
      <strong>温馨提示</strong><br>
      以下测试仅供娱乐，非医学诊断。如果你感到情绪低落或有心理困扰，建议寻求专业帮助。
    </div>

    <div id="quizList">
      <h1 class="page-title">趣味测评</h1>
      <p class="page-subtitle">用荒诞的题目检测你的精神状态，结果可能让你笑出声</p>

      <div id="quizCards"></div>
    </div>

    <div id="quizPage" class="hidden">
      <div class="quiz-container">
        <div class="quiz-progress" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressBar">
          <div class="quiz-progress-bar">
            <div class="quiz-progress-fill" id="progressFill"></div>
          </div>
          <span class="quiz-progress-text" id="progressText">1/8</span>
        </div>

        <div id="questionContainer">
          <div class="quiz-question" id="questionText"></div>
          <div class="quiz-options" id="optionsContainer"></div>
        </div>

        <div class="quiz-nav">
          <button class="cta cta-ghost" id="prevBtn" onclick="prevQuestion()">上一题</button>
          <button class="cta cta-primary" id="nextBtn" onclick="nextQuestion()">下一题</button>
        </div>
      </div>
    </div>

    <div id="resultPage" class="hidden">
      <div class="quiz-container">
        <div class="quiz-result">
          <div class="quiz-result-emoji" id="resultEmoji"></div>
          <div class="quiz-result-type-label" id="resultType"></div>
          <div class="quiz-result-title" id="resultTitle"></div>
          <div class="quiz-result-tagline" id="resultTagline"></div>
          <div class="quiz-result-desc" id="resultDesc"></div>
          <div class="quiz-result-advice" id="resultAdvice"></div>

          <div class="result-actions">
            <button class="cta cta-primary" onclick="shareResult()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle;" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"></path><polyline points="16 6 12 2 8 6"></polyline><line x1="12" y1="2" x2="12" y2="15"></line></svg>
              分享
            </button>
            <button class="cta cta-ghost" onclick="restartQuiz()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;vertical-align:middle;" aria-hidden="true"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></svg>
              再测
            </button>
          </div>

          <div class="result-rec-title">适合你的内容</div>
          <div id="recommendations"></div>
        </div>
      </div>
    </div>
  </main>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <a href="index.html" class="bottom-nav-item">
        <span>首页</span>
      </a>
      <a href="quiz.html" class="bottom-nav-item active">
        <span>测评</span>
      </a>
      <a href="collection.html" class="bottom-nav-item">
        <span>合集</span>
      </a>
      <a href="tools.html" class="bottom-nav-item">
        <span>工具</span>
      </a>
      <a href="about.html" class="bottom-nav-item">
        <span>关于</span>
      </a>
    </div>
  </nav>

  <footer class="footer">
    <div class="footer-text">Soul Soother - 用抽象接住崩溃，用玩笑降低痛感</div>
    <div class="footer-text">本网站仅供娱乐和放松，不能替代专业医疗建议</div>
    <div class="footer-links">
      <a href="about.html">关于我们</a>
      <a href="about.html#help">求助资源</a>
      <a href="https://github.com/tangzi-kk/soul-soother" target="_blank">GitHub</a>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script>
    var resultEmojis = {
      'atmer': '💸',
      'zzzz': '💤',
      'malo': '🐒',
      'shadow-roach': '🪳',
      'hedgehog': '🦔',
      'chameleon': '🦎',
      'ghost': '👻',
      'blackhole': '🕳️'
    };

    var quizIcons = {
      'mental-state': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>',
      'social-mask': '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>'
    };

    document.addEventListener('DOMContentLoaded', function() {
      renderQuizList();
    });

    function renderQuizList() {
      var container = document.getElementById('quizCards');
      var html = '';
      for (var i = 0; i < quizzes.length; i++) {
        var q = quizzes[i];
        var iconSvg = quizIcons[q.id] || '';
        html += '<div class="quiz-card" onclick="startQuiz(\'' + q.id + '\')">' +
          '<div class="quiz-card-header">' +
            '<span class="quiz-card-icon">' + iconSvg + '</span>' +
            '<div>' +
              '<div class="quiz-card-title">' + q.name + '</div>' +
              '<div class="quiz-card-desc">' + q.description + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="quiz-card-meta">' +
            '<span class="quiz-card-time">' + q.duration + '</span>' +
            '<button class="cta cta-primary" style="padding: 8px 18px; font-size: 13px;">' +
              '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:4px;vertical-align:middle;"><polyline points="9 18 15 12 9 6"></polyline></svg>' +
              '开始测试' +
            '</button>' +
          '</div>' +
        '</div>';
      }
      container.innerHTML = html;
    }

    var currentQuiz = null;
    var currentQuestion = 0;
    var answers = [];

    function startQuiz(quizId) {
      for (var i = 0; i < quizzes.length; i++) {
        if (quizzes[i].id === quizId) {
          currentQuiz = quizzes[i];
          break;
        }
      }
      currentQuestion = 0;
      answers = [];

      document.getElementById('quizList').classList.add('hidden');
      document.getElementById('quizPage').classList.remove('hidden');
      document.getElementById('resultPage').classList.add('hidden');

      renderQuestion();
    }

    function renderQuestion() {
      var question = currentQuiz.questions[currentQuestion];
      document.getElementById('questionText').textContent = question.text;

      var optionsHtml = '';
      for (var i = 0; i < question.options.length; i++) {
        var selectedClass = answers[currentQuestion] === i ? 'selected' : '';
        optionsHtml += '<div class="quiz-option ' + selectedClass + '" onclick="selectOption(' + i + ')">' +
          question.options[i].text + '</div>';
      }
      document.getElementById('optionsContainer').innerHTML = optionsHtml;

      var progress = ((currentQuestion + 1) / currentQuiz.questions.length) * 100;
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('progressBar').setAttribute('aria-valuenow', Math.round(progress));
      document.getElementById('progressText').textContent = (currentQuestion + 1) + '/' + currentQuiz.questions.length;

      document.getElementById('prevBtn').style.visibility = currentQuestion === 0 ? 'hidden' : 'visible';
      var nextBtn = document.getElementById('nextBtn');
      if (currentQuestion === currentQuiz.questions.length - 1) {
        nextBtn.innerHTML = '查看结果<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px;vertical-align:middle;"><polyline points="9 18 15 12 9 6"></polyline></svg>';
      } else {
        nextBtn.innerHTML = '下一题<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:4px;vertical-align:middle;"><polyline points="9 18 15 12 9 6"></polyline></svg>';
      }
    }

    function selectOption(index) {
      answers[currentQuestion] = index;
      renderQuestion();
    }

    function nextQuestion() {
      if (answers[currentQuestion] === undefined) {
        alert('选一个吧，反正没有标准答案');
        return;
      }

      if (currentQuestion < currentQuiz.questions.length - 1) {
        currentQuestion++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function showResult() {
      var score = 0;
      for (var i = 0; i < answers.length; i++) {
        score += currentQuiz.questions[i].options[answers[i]].value;
      }

      var result = null;
      for (var j = 0; j < currentQuiz.results.length; j++) {
        if (score >= currentQuiz.results[j].minScore && score <= currentQuiz.results[j].maxScore) {
          result = currentQuiz.results[j];
          break;
        }
      }
      if (!result) result = currentQuiz.results[currentQuiz.results.length - 1];

      document.getElementById('resultEmoji').textContent = resultEmojis[result.id] || '🎭';
      document.getElementById('resultType').textContent = result.type || '';
      document.getElementById('resultTitle').textContent = result.name;
      document.getElementById('resultTagline').textContent = result.tagline;
      document.getElementById('resultDesc').textContent = result.description;
      document.getElementById('resultAdvice').textContent = result.advice;

      var recIcons = {
        'Pixel Thoughts': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>',
        '流体模拟': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>',
        '发疯文学生成器': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>'
      };

      var recommendations = [
        { name: 'Pixel Thoughts', desc: '60秒冥想，把烦恼放进星星里', url: 'collection.html' },
        { name: '流体模拟', desc: '鼠标划过产生美丽的色彩流动', url: 'collection.html' },
        { name: '发疯文学生成器', desc: '输入情绪，生成发疯文学', url: 'tools.html#fengwen' }
      ];

      var recHtml = '';
      for (var k = 0; k < recommendations.length; k++) {
        var r = recommendations[k];
        var recIcon = recIcons[r.name] || '';
        recHtml += '<a href="' + r.url + '" style="text-decoration: none; color: inherit;">' +
          '<div class="recommendation-item">' +
            '<span class="recommendation-icon">' + recIcon + '</span>' +
            '<div>' +
              '<div class="recommendation-name">' + r.name + '</div>' +
              '<div class="recommendation-desc">' + r.desc + '</div>' +
            '</div>' +
          '</div>' +
        '</a>';
      }
      document.getElementById('recommendations').innerHTML = recHtml;

      document.getElementById('quizPage').classList.add('hidden');
      document.getElementById('resultPage').classList.remove('hidden');
    }

    function shareResult() {
      var title = document.getElementById('resultTitle').textContent;
      var text = '我在 Soul Soother 测出来是「' + title + '」，快来测测你的精神状态！';

      if (navigator.share) {
        navigator.share({ title: 'Soul Soother 测评结果', text: text });
      } else if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() {
          alert('结果已复制到剪贴板');
        });
      } else {
        alert(text);
      }
    }

    function restartQuiz() {
      document.getElementById('resultPage').classList.add('hidden');
      document.getElementById('quizList').classList.remove('hidden');
    }
  </script>
  <script src="js/p5-gravity.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (window.GravityP5) {
        window.GravityP5.init('gravityBg');
      }
    });
  </script>
</body>
</html>
